    <script type="text/javascript">
      (function(l) {
    // Check if the URL has the 'p' parameter from our 404 redirect
      if (l.search.indexOf('p=/') !== -1) {
      // Extract the path (e.g., /about) from the query string
      var path = l.search.split('p=')[1].split('&')[0].replace(/~and~/g, '&');
      
        // Clean the URL: remove the ?p=/about and replace the browser state
          window.history.replaceState(null, null,
          l.pathname.slice(0, -1) + path + l.hash
          );
        }
      }(window.location))
    </script>
